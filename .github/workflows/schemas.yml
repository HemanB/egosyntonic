name: schemas

on:
  push:
    branches: [main]
    paths:
      - "shared/**"
      - ".github/workflows/schemas.yml"
  pull_request:
    paths:
      - "shared/**"
      - ".github/workflows/schemas.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate JSON files parse
        run: |
          python - <<'PY'
          import json, glob, sys
          errors = 0
          for path in sorted(glob.glob('shared/schemas/*.json') + glob.glob('shared/vocabularies/*.json')):
              try:
                  with open(path) as f:
                      json.load(f)
                  print(f'  OK  {path}')
              except json.JSONDecodeError as e:
                  print(f'FAIL  {path}: {e}')
                  errors += 1
          sys.exit(errors)
          PY

      - name: Validate schemas conform to draft 2020-12
        run: |
          python - <<'PY'
          import json, glob, sys
          from jsonschema import Draft202012Validator
          errors = 0
          for path in sorted(glob.glob('shared/schemas/*.json')):
              with open(path) as f:
                  schema = json.load(f)
              try:
                  Draft202012Validator.check_schema(schema)
                  print(f'  OK  {path}')
              except Exception as e:
                  print(f'FAIL  {path}: {e}')
                  errors += 1
          sys.exit(errors)
          PY
