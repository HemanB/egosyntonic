name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "shared/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "shared/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type-check
        run: uv run pyright

      - name: Pytest
        run: uv run pytest --cov=reasoning --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push yet)
        uses: docker/build-push-action@v6
        with:
          # Build context is repo root so the Dockerfile can include shared/.
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: egosyntonic-reasoning:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
