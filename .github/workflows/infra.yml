name: infra

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"

defaults:
  run:
    working-directory: infra

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init without backend (validation only)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate -no-color

  # Plan job runs only when WIF is configured. Until then this job is skipped
  # by the `if: false` guard — flip to true once `terraform apply` has run
  # at least once and the Terraform outputs have populated GitHub secrets:
  # GCP_PROJECT_ID, GCP_WIF_PROVIDER, GCP_CI_SA, TFSTATE_BUCKET.
  plan-dev:
    if: false
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for WIF
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account:           ${{ secrets.GCP_CI_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="prefix=infra"

      - name: Plan (dev)
        run: terraform plan -var-file=envs/dev.tfvars -no-color
